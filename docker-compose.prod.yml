services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_datas:/var/lib/postgresql/data
    networks:
      - connectDB

  backend:
    image: ghcr.io/sophie-rud/localloop-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - connectDB
      - localloop

networks:
  connectDB:
    driver: bridge
  localloop:
    external: true

volumes:
  postgres_datas:
  uploads:
